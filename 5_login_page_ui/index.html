<!DOCTYPE html>
<html>
<head>
<style>

.box {

padding: 20px;

text-align: center;

input {

padding: 8px;

</head>
<body>
<div class="box">
<h2>Login</h2>
<input type="text" placeholder="Username"><br>
<input type="password" placeholder="Password"><br>
<button>Login</button>
</div>
</body>
</html>
