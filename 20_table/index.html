<!DOCTYPE html>
<html>
<head>
<title>Simple Table</title>
<style>
table {
border-collapse: collapse;
width: 50%;    }
th, td {
border: 1px solid black;
padding: 8px;
text-align: center;    }
</style>
</head>
<body>
<h2>Student Table</h2>
<table>
<tr>
<th>Name</th>
<th>Age</th>
<th>Course</th>
</tr>
<tr>
<td>Aravind</td>
<td>20</td>
<td>CSE</td>
</tr>
<tr>
<td>Kumar</td>
<td>21</td>
<td>IT</td>   </tr>
</table>
</body>
</html>
