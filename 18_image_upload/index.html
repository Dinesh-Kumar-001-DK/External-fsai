<!DOCTYPE html>
<html>
<body>
<input type="file" id="file">
<button onclick="upload()">Upload</button>
<script>
function upload() {
let f = file.files[0];
let form = new FormData();
form.append("img", f);
fetch("http://localhost:3000/upload", {
method: "POST",
body: form  })
.then(res => res.text())
.then(alert);  }
</script>
</body>
</html>
